server {
    listen 80;
    server_name nevastm.ru;  # <-- Заменить на свой домен

    # Редирект на HTTPS (после настройки SSL)
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name nevastm.ru;  # <-- Заменить на свой домен

    # SSL — Let's Encrypt (certbot настроит автоматически)
    ssl_certificate /etc/letsencrypt/live/nevastm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nevastm.ru/privkey.pem;

    client_max_body_size 5M;

    # Фронтенд — статика из dist/
    root /opt/navibot/frontend/dist;
    index index.html;

    # API → Gunicorn
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Аватарки — напрямую из папки
    location /api/avatars/ {
        alias /opt/navibot/avatars/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Статика фронтенда — кеширование
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — все остальные маршруты → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
